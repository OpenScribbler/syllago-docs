extends: conditional
message: "Spell out '%s' upon its first appearance."
level: suggestion
scope: ~heading & ~text.frontmatter
ignorecase: false
first: '\b([A-Z]{3,5})(?!''s\b|s\b)\b'
second: '(?:\b[A-Z][a-z]+ )+\(([A-Z]{3,5})\)|(?:\[[^\]]*\])'
exceptions:
  - API
  - ASCII
  - AUTO
  - AWS
  - CLI
  - CSS
  - DNS
  - END
  - FAQ
  - HOOKS
  - HTML
  - HTTP
  - HTTPS
  - IDE
  - ISO
  - JSON
  - JSONC
  - JWT
  - LLM
  - MAY
  - MCP
  - MDX
  - MOAT
  - MUST
  - OIDC
  - PKI
  - POST
  - REST
  - SDK
  - SHA
  - SHALL
  - SHOULD
  - SSH
  - SSL
  - START
  - TLS
  - TOFU
  - TOML
  - TUI
  - TTY
  - URI
  - URL
  - UUID
  - WSL
  - YAML
