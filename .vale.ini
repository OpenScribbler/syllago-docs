StylesPath = vale/styles
MinAlertLevel = suggestion
IgnoredScopes = code, img, tt
SkippedScopes = code, figure, pre, script, style

[formats]
mdx = md

# Lint all manually-authored prose under src/content/.
# Files outside src/content/ match no glob and are skipped.
[src/content/**/*.{md,mdx}]
BasedOnStyles = Syllago, Vale
Vale.Spelling = NO

# Auto-generated by scripts/sync-*.ts — edits are silently rolled back on
# prebuild (see .wolf/cerebrum.md [2026-04-18]). Fixes belong upstream in
# the syllago repo, not here, so linting them only produces unfixable noise.
[src/content/docs/errors/**]
BasedOnStyles =

[src/content/docs/reference/canonical-keys/**]
BasedOnStyles =

[src/content/docs/using-syllago/cli-reference/**]
BasedOnStyles =

[src/content/docs/reference/agents-matrix.mdx]
BasedOnStyles =

[src/content/docs/reference/capabilities-matrix.mdx]
BasedOnStyles =

[src/content/docs/reference/commands-matrix.mdx]
BasedOnStyles =

[src/content/docs/reference/hook-events.mdx]
BasedOnStyles =

[src/content/docs/reference/mcp-configs-matrix.mdx]
BasedOnStyles =

[src/content/docs/reference/rules-matrix.mdx]
BasedOnStyles =

[src/content/docs/reference/skills-matrix.mdx]
